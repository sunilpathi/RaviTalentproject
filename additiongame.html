
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Addition Game</title>

<style>
:root{
--bg:linear-gradient(135deg,#43cea2,#185a9d);
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
margin-top:15px;
font-size:clamp(22px,4vw,32px);
}

.top-bar{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.15);
padding:10px 15px;
border-radius:15px;
backdrop-filter:blur(10px);
}

button,select{
padding:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button{
background:#ff7b54;
color:white;
}

button:hover{
opacity:0.8;
}

select{
background:white;
color:black;
}

.game-box{
margin-top:25px;
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
text-align:center;
width:90%;
max-width:400px;
backdrop-filter:blur(10px);
}

.question{
font-size:clamp(28px,6vw,40px);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
text-align:center;
}

.submit-btn{
margin-top:12px;
width:100%;
font-size:18px;
background:#00c853;
}

.submit-btn:hover{
background:#00a844;
}

.win{
margin-top:20px;
display:none;
text-align:center;
}

.stars{
color:gold;
font-size:24px;
}
</style>
</head>

<body>

<h1>➕ Math Addition Game</h1>

<div class="top-bar">
<span>Score: <b id="score">0</b></span>
<span>Time: <b id="time">30</b>s</span>

<select id="level">
<option value="10">Easy</option>
<option value="50">Medium</option>
<option value="100">Hard</option>
</select>

<button onclick="startGame()">Start Game</button>
</div>

<div class="game-box">
<div class="question" id="question">Press Start</div>

<input type="number" id="answer" placeholder="Enter Answer">

<button class="submit-btn" onclick="checkAnswer()">Submit Answer</button>
</div>

<div class="win" id="win">
🎉 Time's Up!<br>
<div class="stars" id="stars"></div>
</div>

<script>
let num1,num2,correct;
let score=0,time=30,timer;

function startGame(){

score=0;
time=30;

document.getElementById("score").textContent=0;
document.getElementById("time").textContent=30;
document.getElementById("win").style.display="none";

nextQuestion();

clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById("time").textContent=time;

if(time<=0){
clearInterval(timer);
endGame();
}
},1000);

}

function nextQuestion(){

let max=parseInt(document.getElementById("level").value);

num1=Math.floor(Math.random()*max);
num2=Math.floor(Math.random()*max);

correct=num1+num2;

document.getElementById("question").textContent=`${num1} + ${num2} = ?`;
document.getElementById("answer").value="";
}

function checkAnswer(){

let input=document.getElementById("answer");
let ans=parseInt(input.value);

if(isNaN(ans)) return;

if(ans===correct){
score++;
playSound(700);
}else{
playSound(200);
}

document.getElementById("score").textContent=score;

input.value="";
nextQuestion();
}

document.getElementById("answer").addEventListener("keyup",function(e){
if(e.key==="Enter"){
checkAnswer();
}
});

function endGame(){

document.getElementById("win").style.display="block";

let stars="⭐️⭐️⭐️";
if(score<10) stars="⭐️⭐️";
if(score<5) stars="⭐️";

document.getElementById("stars").textContent=stars;

playSound(1000);
}

function playSound(freq){
let ctx=new(window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.frequency.value=freq;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);
}
</script>

</body>
</html>
