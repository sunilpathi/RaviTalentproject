
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Builder Game</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#36d1dc,#5b86e5);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{margin-top:15px;}

.top-bar{
display:flex;
gap:15px;
flex-wrap:wrap;
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:15px;
}

.game-box{
margin-top:20px;
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:15px;
width:90%;
max-width:500px;
text-align:center;
}

.word{
font-size:28px;
letter-spacing:5px;
margin-bottom:15px;
}

.letters{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.letter{
background:white;
color:black;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

.letter:hover{background:#ffe0b2;}

.input{
margin-top:15px;
font-size:22px;
letter-spacing:5px;
min-height:30px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#ff7b54;
color:white;
cursor:pointer;
}

.result{display:none;margin-top:20px;}
</style>
</head>

<body>

<h1>🔤 Word Builder Game</h1>

<div class="top-bar">
<span>Score: <b id="score">0</b></span>
<span>Time: <b id="time">60</b>s</span>
<button onclick="startGame()">Start</button>
</div>

<div class="game-box">
<div class="word" id="jumbled">Press Start</div>

<div class="letters" id="letters"></div>

<div class="input" id="input"></div>

<button onclick="checkWord()">Submit</button>
<button onclick="clearInput()">Clear</button>
</div>

<div class="result" id="result">
🎉 Game Completed!
</div>

<script>

const words=[
"APPLE","BALL","CAT","DOG","BOOK","TREE","HOUSE","WATER","SCHOOL","TEACHER",
"STUDENT","PENCIL","PAPER","CHAIR","TABLE","MANGO","BANANA","ORANGE","GRAPES","MILK",
"BREAD","RICE","SUGAR","SALT","SUN","MOON","STAR","EARTH","PLANT","FLOWER",
"ROOT","LEAF","STEM","FRUIT","ANIMAL","BIRD","FISH","HORSE","COW","GOAT",
"LION","TIGER","ELEPHANT","CAR","BUS","TRAIN","BIKE","ROAD","CITY","VILLAGE",
"INDIA","WORLD","MAP","RIVER","MOUNTAIN","OCEAN","RAIN","CLOUD","WIND","FIRE"
];

let current=0,score=0,time=60,timer,correctWord="";

function startGame(){
score=0;
time=60;
current=0;

document.getElementById("score").textContent=0;
document.getElementById("time").textContent=60;
document.getElementById("result").style.display="none";

nextWord();

clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById("time").textContent=time;

if(time<=0){
clearInterval(timer);
endGame();
}
},1000);
}

function shuffle(word){
return word.split('').sort(()=>Math.random()-0.5);
}

function nextWord(){

if(current>=words.length){
endGame();
return;
}

correctWord=words[current];
let jumbledArr=shuffle(correctWord);

document.getElementById("jumbled").textContent=jumbledArr.join(" ");
document.getElementById("letters").innerHTML="";
document.getElementById("input").textContent="";

jumbledArr.forEach(letter=>{
let btn=document.createElement("div");
btn.className="letter";
btn.textContent=letter;
btn.onclick=()=>addLetter(letter,btn);
document.getElementById("letters").appendChild(btn);
});

}

function addLetter(letter,btn){
document.getElementById("input").textContent+=letter;
btn.style.visibility="hidden";
}

function clearInput(){
document.getElementById("input").textContent="";
nextWord();
}

function checkWord(){

let user=document.getElementById("input").textContent;

if(user===correctWord){
score++;
playSound(700);
}else{
playSound(200);
}

document.getElementById("score").textContent=score;
current++;
nextWord();
}

function endGame(){
document.getElementById("result").style.display="block";
document.getElementById("jumbled").textContent="Game Over!";
document.getElementById("letters").innerHTML="";
}

function playSound(freq){
let ctx=new(window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.frequency.value=freq;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);
}

</script>

</body>
</html>
